name: CI

on: [push, pull_request]

jobs:
  rust:
    name: rust core + cli + ffi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Cargo test + build (toolchain pinned by rust-toolchain.toml)
        run: |
          cargo test --workspace
          cargo build --workspace

  windows-build:
    name: windows GUI build (single exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # ps2exe (the adapter freeze needs it)
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: freeze adapter (PyInstaller one-file)
        working-directory: ps2exe-adapter
        run: uv run --group dev pyinstaller --noconfirm prism-adapter.spec
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # prism-win is excluded from the root workspace; it has its own target dir.
          workspaces: crates/prism-win
          key: windows-msvc
      - name: build prism-win with the adapter embedded (single self-contained exe)
        # build.rs embeds $PRISM_ADAPTER_EXE; the app extracts it to TEMP on launch.
        env:
          PRISM_ADAPTER_EXE: ${{ github.workspace }}\ps2exe-adapter\dist\prism-adapter.exe
        run: cargo build --release --manifest-path crates/prism-win/Cargo.toml
      - name: upload single exe
        uses: actions/upload-artifact@v4
        with:
          name: prism-win-${{ github.sha }}
          path: crates/prism-win/target/release/prism-win.exe
          if-no-files-found: error

  windows-winui:
    name: windows WinUI 3 app (folder artifact)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # ps2exe (the adapter freeze needs it)
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: freeze adapter (PyInstaller one-file)
        working-directory: ps2exe-adapter
        run: uv run --group dev pyinstaller --noconfirm prism-adapter.spec
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: windows-ffi
      - name: build prism_ffi.dll (release)
        run: cargo build -p prism-ffi --release
      - name: cache uniffi-bindgen-cs
        id: bindgen-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen-cs.exe
          key: uniffi-bindgen-cs-v0.11.0+v0.31.0
      - name: install uniffi-bindgen-cs (tag matches the uniffi 0.31 dep)
        if: steps.bindgen-cache.outputs.cache-hit != 'true'
        run: cargo install uniffi-bindgen-cs --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.11.0+v0.31.0 --locked
      - name: generate C# bindings from the built DLL
        run: uniffi-bindgen-cs --library target/release/prism_ffi.dll --out-dir windows/PrismWin/Generated
      - name: publish app (self-contained, unpackaged)
        run: dotnet publish windows/PrismWin/PrismWin.csproj -c Release -r win-x64 -p:Platform=x64 --self-contained true -o windows/dist/PrismWin
      - name: verify publish output is launchable
        shell: pwsh
        # resources.pri carries the compiled XAML; when dotnet publish drops it
        # the app dies silently at InitializeComponent (seen 2026-07-20).
        run: |
          $out = "windows/dist/PrismWin"
          if (-not (Test-Path "$out/resources.pri")) {
            $pri = Get-ChildItem windows/PrismWin/bin -Recurse -Filter resources.pri | Select-Object -First 1
            if ($pri) { Copy-Item $pri.FullName "$out/resources.pri" }
          }
          foreach ($f in "PrismWin.exe","PrismWin.dll","prism_ffi.dll","resources.pri","Assets/prism.ico") {
            if (-not (Test-Path "$out/$f")) { throw "missing $f in publish output" }
          }
      - name: bundle adapter + zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force windows/dist/PrismWin/adapter | Out-Null
          Copy-Item ps2exe-adapter/dist/prism-adapter.exe windows/dist/PrismWin/adapter/
          Compress-Archive -Path windows/dist/PrismWin/* -DestinationPath windows/dist/PrismWin-winui.zip
      - name: upload app folder
        uses: actions/upload-artifact@v4
        with:
          name: PrismWin-winui-${{ github.sha }}
          path: windows/dist/PrismWin-winui.zip
          if-no-files-found: error

  macos-build:
    name: macOS app build (.app artifact)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # ps2exe (the adapter freeze needs it)
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: macos/.build
          # Invalidate when Swift sources, the package, or the FFI/core surface (which
          # the regenerated UniFFI bindings derive from) change; restore-keys lets a
          # stale .build seed an incremental rebuild.
          key: swiftpm-${{ runner.os }}-${{ hashFiles('macos/Package.swift', 'macos/Sources/**', 'crates/prism-ffi/src/**', 'crates/prism-core/src/**') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-
      - name: build Prism.app (release, adapter frozen + embedded by build-app.sh)
        run: bash macos/build-app.sh release
      - name: ad-hoc codesign (reduces Gatekeeper friction on download)
        run: codesign --force --deep --sign - macos/dist/Prism.app
      - name: zip the bundle (ditto preserves the .app structure)
        run: ditto -c -k --keepParent macos/dist/Prism.app macos/dist/Prism-app.zip
      - name: upload app
        uses: actions/upload-artifact@v4
        with:
          name: Prism-macos-${{ github.sha }}
          path: macos/dist/Prism-app.zip
          if-no-files-found: error

  release:
    name: publish downloadable builds
    runs-on: ubuntu-latest
    needs: [windows-build, windows-winui, macos-build]
    # Pushes only: fork PRs lack (and shouldn't have) release-write permission.
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dl
      - name: stage assets with random, unguessable names
        run: |
          set -euo pipefail
          token=$(openssl rand -hex 6)
          mkdir out
          # Windows classic is a single self-contained .exe (adapter embedded); the WinUI 3
          # app is a self-contained folder zip; macOS is the .app zip.
          cp dl/prism-win-*/prism-win.exe "out/Prism-win-${token}.exe"
          cp dl/PrismWin-winui-*/PrismWin-winui.zip "out/Prism-win-winui-${token}.zip"
          cp dl/Prism-macos-*/Prism-app.zip        "out/Prism-mac-${token}.zip"
          ls -la out
      - name: publish per-branch draft release (rolling; hidden from /releases, no git tag)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME//\//-}"          # sanitize slashes (feature/x -> feature-x)
          tag="ci-${branch}"
          title="CI build (${GITHUB_REF_NAME} @ ${GITHUB_SHA:0:8})"
          notes="Latest automated build of \`${GITHUB_REF_NAME}\` (${GITHUB_SHA}). Draft, unsigned/ad-hoc-signed."
          # One rolling draft per branch: recreate it each push so the randomly-named
          # assets don't accumulate (--draft pushes no git tag; the tag is just a label).
          gh release delete "$tag" --yes 2>/dev/null || true
          gh release create "$tag" out/* --target "$GITHUB_SHA" --title "$title" --notes "$notes" --draft
          url=$(gh release view "$tag" --json url -q .url)
          {
            echo "### Draft build — not listed on /releases, sign-in required"
            echo "Draft page: $url"
            echo ""
            echo "Assets:"
            gh release view "$tag" --json assets -q '.assets[] | "- \(.name)"'
            echo ""
            echo "Download: \`gh release download $tag\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: prune stale ci-* drafts (no push for 7 days, ci-main exempt)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Each push recreates its branch's draft, so created_at is the branch's
          # last push time: older than the cutoff means the branch went quiet.
          cutoff=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          gh api "repos/${GH_REPO}/releases" --paginate \
            --jq ".[] | select(.draft and (.tag_name | startswith(\"ci-\")) and .tag_name != \"ci-main\" and .created_at < \"$cutoff\") | .id" |
          while read -r id; do
            gh api -X DELETE "repos/${GH_REPO}/releases/${id}"
          done

  web:
    name: web (tsc + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  adapter:
    name: python adapter (audio fp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ps2exe-adapter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # ps2exe (the archive tests import its reader stack)
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: pytest (ps2exe deps limited to the archive stack, pins match pyproject)
        run: >-
          uv run --no-project --with numpy --with blake3==1.0.8 --with fastcdc==1.7.0
          --with pycdlib==1.14.0 --with bitarray==3.8.1 --with psutil==7.2.2
          --with rarfile==4.2 --with libarchive-c==5.3 --with inflate64==1.0.4
          --with pytest pytest tests/ -q
