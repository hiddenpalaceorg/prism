# Windows-only; excluded from the root workspace. Build explicitly on Windows:
#   cargo build --manifest-path crates/curator-gui-win/Cargo.toml
[package]
name = "curator-gui-win"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Curator native Windows GUI (windows-rs) — scaffold."

[dependencies]
curator-core = { path = "../curator-core" }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Controls",
    "Win32_Graphics_Gdi",
    "Win32_System_LibraryLoader",
] }
